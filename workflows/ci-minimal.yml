name: CI Minimal

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify superproject metadata
        run: |
          test -f .gitmodules
          echo "Submodule count: $(grep -c '^\[submodule' .gitmodules || true)"
      - name: Success
        run: echo "::notice::Superproject CI passed"
